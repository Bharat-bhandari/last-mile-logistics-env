spec_version: 1
name: last_mile_env
env_id: "lmlc-mumbai-v1"
type: space
runtime: fastapi
app: last_mile_env.server.app:app  # Full path from root
port: 7860                        # MUST be 7860 for Hugging Face

tasks:
  - id: easy
    name: "Easy - Single Delivery"
    description: "Single vehicle, single order, static low traffic, generous deadline."
    grader:
      module: last_mile_env.tasks
      class: BaseGrader

  - id: medium
    name: "Medium - Multi-Vehicle Dynamic"
    description: "Two vehicles, two orders, dynamic traffic with SV Road spikes."
    grader:
      module: last_mile_env.tasks
      class: BaseGrader

  - id: hard
    name: "Hard - High Pressure"
    description: "One vehicle, three orders, tight deadlines, extreme stochastic traffic."
    grader:
      module: last_mile_env.tasks
      class: BaseGrader

# Top-level grader (fallback / default)
grader:
  module: last_mile_env.tasks
  class: BaseGrader